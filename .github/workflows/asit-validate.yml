name: ASIT taxonomy validation

on:
  push:
    paths:
      - "asit/**"
      - ".github/workflows/asit-validate.yml"
  pull_request:
    paths:
      - "asit/**"
      - ".github/workflows/asit-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pyyaml jsonschema

      - name: Validate taxonomy (schema, referential integrity, ID stability)
        run: python asit/scripts/validate.py

      # A docs-in-sync check (build.py must produce no diff) is added once
      # build.py lands, after the category list is signed off.
